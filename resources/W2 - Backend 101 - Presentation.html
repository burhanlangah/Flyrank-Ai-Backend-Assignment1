<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Backend 101 — How the Web Works · FlyRank W2</title>
    <style>
      :root {
        --bg: #0a2426;
        --card: #102e2f;
        --card2: #16393a;
        --ink: #071a1c;
        --acc: #6cdd9b;
        --txt: #f1f1f1;
        --mut: #9fb8b2;
        --warn: #f9c74f;
        --err: #f97066;
        --blue: #8ab4f8;
        --side: 240px;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html,
      body {
        height: 100%;
      }
      body {
        background: var(--bg);
        color: var(--txt);
        font-family:
          "Segoe UI",
          system-ui,
          -apple-system,
          sans-serif;
        overflow: hidden;
      }
      .mono {
        font-family: "Cascadia Code", "Fira Code", Consolas, monospace;
      }
      button {
        cursor: pointer;
        border: none;
        border-radius: 8px;
        font-weight: 700;
        font-family: inherit;
      }

      /* ===== layout ===== */
      #app {
        display: flex;
        height: 100vh;
      }
      /* sidebar */
      #side {
        width: var(--side);
        min-width: var(--side);
        background: var(--ink);
        padding: 16px 0;
        overflow-y: auto;
        border-right: 1px solid var(--card2);
        transition: margin 0.25s;
      }
      #side.hidden {
        margin-left: calc(var(--side) * -1);
      }
      #side .brand {
        padding: 0 16px 12px;
        border-bottom: 1px solid var(--card2);
        margin-bottom: 10px;
      }
      #side .brand .fr {
        font-size: 17px;
        font-weight: 800;
        color: #fff;
      }
      #side .brand .fr span {
        color: var(--acc);
      }
      #side .brand .wk {
        font-size: 10px;
        color: var(--mut);
        letter-spacing: 0.18em;
        text-transform: uppercase;
        margin-top: 2px;
      }
      #side .chap {
        font-size: 9.5px;
        letter-spacing: 0.2em;
        color: var(--acc);
        text-transform: uppercase;
        font-weight: 700;
        padding: 12px 16px 4px;
      }
      #side a {
        display: block;
        padding: 5px 16px 5px 22px;
        color: var(--mut);
        text-decoration: none;
        font-size: 12.5px;
        border-left: 3px solid transparent;
        line-height: 1.35;
      }
      #side a:hover {
        color: var(--txt);
        background: var(--card);
      }
      #side a.on {
        color: var(--acc);
        border-left-color: var(--acc);
        background: var(--card);
        font-weight: 600;
      }
      /* main */
      #main {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-width: 0;
      }
      #topbar {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 18px;
        border-bottom: 1px solid var(--card2);
      }
      #topbar .tb {
        background: var(--card);
        color: var(--mut);
        padding: 6px 12px;
        font-size: 12px;
      }
      #topbar .tb:hover {
        color: var(--txt);
      }
      #counter {
        margin-left: auto;
        color: var(--mut);
        font-size: 12px;
      }
      #progress {
        height: 3px;
        background: var(--card);
      }
      #bar {
        height: 100%;
        width: 0;
        background: var(--acc);
        transition: width 0.25s;
      }
      #stage {
        flex: 1;
        overflow-y: auto;
        padding: 28px 40px;
      }
      /* notes */
      #notes {
        display: none;
        border-top: 1px solid var(--card2);
        background: var(--ink);
        padding: 10px 18px;
        font-size: 12.5px;
        color: var(--mut);
        max-height: 22vh;
        overflow-y: auto;
      }
      #notes.show {
        display: block;
      }
      #notes b {
        color: var(--acc);
      }
      /* nav arrows */
      #navbtns {
        position: fixed;
        right: 18px;
        bottom: 16px;
        display: flex;
        gap: 8px;
        z-index: 5;
      }
      #navbtns button {
        background: var(--card2);
        color: var(--txt);
        width: 40px;
        height: 40px;
        font-size: 16px;
        border-radius: 50%;
      }
      #navbtns button:hover {
        background: var(--acc);
        color: var(--ink);
      }

      /* ===== slide primitives ===== */
      .slide {
        display: none;
        max-width: 1060px;
        margin: 0 auto;
        animation: fade 0.25s;
      }
      .slide.active {
        display: block;
      }
      @keyframes fade {
        from {
          opacity: 0;
          transform: translateY(6px);
        }
        to {
          opacity: 1;
        }
      }
      .kick {
        display: flex;
        align-items: center;
        gap: 9px;
        color: var(--acc);
        font-weight: 700;
        letter-spacing: 0.24em;
        font-size: 11px;
        text-transform: uppercase;
        margin-bottom: 8px;
      }
      .kick::before {
        content: "";
        width: 11px;
        height: 11px;
        background: var(--acc);
      }
      h1.st {
        font-size: clamp(24px, 3.2vw, 36px);
        color: #fff;
        margin-bottom: 8px;
        line-height: 1.2;
      }
      .sub {
        color: var(--mut);
        font-size: 14.5px;
        margin-bottom: 20px;
      }
      .cards {
        display: grid;
        gap: 14px;
        margin: 14px 0;
      }
      .c2 {
        grid-template-columns: 1fr 1fr;
      }
      .c3 {
        grid-template-columns: 1fr 1fr 1fr;
      }
      .c4 {
        grid-template-columns: repeat(4, 1fr);
      }
      .card {
        background: var(--card);
        border-radius: 12px;
        padding: 16px;
        border: 1.5px solid transparent;
      }
      .card.hl {
        border-color: var(--acc);
      }
      .card.err {
        border-color: var(--err);
      }
      .card.wrn {
        border-color: var(--warn);
      }
      .card h3 {
        font-size: 14.5px;
        margin-bottom: 6px;
      }
      .card h3.g {
        color: var(--acc);
      }
      .card h3.y {
        color: var(--warn);
      }
      .card h3.r {
        color: var(--err);
      }
      .card p {
        font-size: 12.5px;
        color: var(--txt);
        line-height: 1.5;
      }
      .card .cap {
        color: var(--mut);
        font-size: 11.5px;
      }
      .strip {
        background: var(--card2);
        border-radius: 10px;
        padding: 12px 16px;
        font-size: 13px;
        margin: 14px 0;
        line-height: 1.55;
      }
      .strip b {
        color: var(--acc);
      }
      .bl {
        font-size: 13.5px;
        color: var(--mut);
        margin-top: 14px;
        line-height: 1.55;
      }
      .bl b {
        color: var(--txt);
      }
      .bl .g {
        color: var(--acc);
        font-weight: 700;
      }
      .ink {
        background: var(--ink);
        border-radius: 10px;
        padding: 14px 16px;
        font-size: 13px;
        line-height: 1.7;
        white-space: pre-wrap;
      }
      .ok {
        color: var(--acc);
      }
      .bad {
        color: var(--err);
      }
      .mid {
        color: var(--warn);
      }
      .dim {
        color: var(--mut);
      }
      .blu {
        color: var(--blue);
      }
      .big {
        font-size: 38px;
        font-weight: 800;
        text-align: center;
      }
      .ico {
        font-size: 26px;
        margin-bottom: 6px;
      }
      .arrowflow {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
        justify-content: center;
        margin: 10px 0;
      }
      .arrowflow .ar {
        color: var(--acc);
        font-size: 20px;
      }
      .pill {
        display: inline-block;
        background: var(--ink);
        border-radius: 6px;
        padding: 3px 9px;
        font-size: 12px;
        color: var(--txt);
      }
      .demo-tag {
        display: inline-block;
        background: var(--err);
        color: #fff;
        font-size: 10px;
        letter-spacing: 0.15em;
        padding: 3px 8px;
        border-radius: 4px;
        margin-left: 8px;
        vertical-align: middle;
      }
      table.tt {
        border-collapse: collapse;
        width: 100%;
        font-size: 12.5px;
        margin: 10px 0;
      }
      table.tt th {
        background: var(--card2);
        color: var(--acc);
        text-align: left;
        padding: 7px 10px;
        font-size: 11px;
      }
      table.tt td {
        background: var(--card);
        padding: 7px 10px;
        border-top: 2px solid var(--bg);
        vertical-align: top;
      }
      .dot {
        display: inline-block;
        width: 9px;
        height: 9px;
        border-radius: 50%;
        margin-right: 6px;
      }
      .dg {
        background: var(--acc);
      }
      .dy {
        background: var(--warn);
      }
      .dr {
        background: var(--err);
      }

      /* interactive bits */
      .seg {
        padding: 7px 9px;
        border-radius: 8px;
        border: 1.5px solid transparent;
        background: var(--card);
        cursor: pointer;
        font-size: clamp(13px, 1.8vw, 18px);
      }
      .seg:hover {
        border-color: var(--mut);
      }
      .seg.on {
        border-color: var(--acc);
        color: var(--acc);
        background: var(--card2);
      }
      .urlbox {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
        background: var(--ink);
        border-radius: 10px;
        padding: 14px;
        justify-content: center;
        margin-bottom: 12px;
      }
      .infobox {
        background: var(--card2);
        border-left: 4px solid var(--acc);
        border-radius: 8px;
        padding: 12px 14px;
        min-height: 64px;
        font-size: 13.5px;
        line-height: 1.55;
      }
      .infobox b {
        color: var(--acc);
      }
      .jstage {
        display: flex;
        gap: 8px;
        background: var(--ink);
        border-radius: 10px;
        padding: 16px 12px;
        margin-bottom: 12px;
        flex-wrap: wrap;
      }
      .jnode {
        flex: 1;
        min-width: 90px;
        text-align: center;
        opacity: 0.35;
        transition: 0.25s;
      }
      .jnode.on {
        opacity: 1;
        transform: scale(1.07);
      }
      .jnode .em {
        font-size: 26px;
      }
      .jnode .nm {
        font-size: 11px;
        color: var(--mut);
        margin-top: 3px;
      }
      .jnode.on .nm {
        color: var(--acc);
        font-weight: 700;
      }
      .btn {
        background: var(--acc);
        color: var(--ink);
        padding: 8px 18px;
        font-size: 13.5px;
      }
      .btn.ghost {
        background: var(--card2);
        color: var(--txt);
      }
      .row {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        align-items: center;
        margin: 10px 0;
      }
      select,
      input[type="text"] {
        background: var(--ink);
        color: var(--txt);
        border: 1px solid var(--card2);
        border-radius: 8px;
        padding: 8px 10px;
        font-size: 13px;
      }
      .verb {
        padding: 8px 16px;
        background: var(--card2);
        color: var(--txt);
        font-size: 13px;
      }
      .verb.on {
        background: var(--acc);
        color: var(--ink);
      }
      .panes {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }
      .pane {
        background: var(--ink);
        border-radius: 10px;
        padding: 13px;
        font-size: 12.5px;
        min-height: 170px;
        white-space: pre-wrap;
      }
      .pane h4 {
        font-size: 10px;
        letter-spacing: 0.18em;
        color: var(--mut);
        text-transform: uppercase;
        margin-bottom: 8px;
        font-family: "Segoe UI", sans-serif;
      }
      .fields {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin: 8px 0;
      }
      .fields label {
        font-size: 13px;
        display: flex;
        gap: 5px;
        align-items: center;
        cursor: pointer;
      }
      .fields input {
        accent-color: var(--acc);
      }
      @media (max-width: 860px) {
        .c3,
        .c4 {
          grid-template-columns: 1fr 1fr;
        }
        .panes {
          grid-template-columns: 1fr;
        }
        #side {
          position: fixed;
          z-index: 9;
          height: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <nav id="side"></nav>
      <div id="main">
        <div id="topbar">
          <button class="tb" id="tgSide">☰ Menu</button>
          <button class="tb" id="tgNotes">Notes (N)</button>
          <button class="tb" id="tgFull">Fullscreen (F)</button>
          <span id="counter"></span>
        </div>
        <div id="progress"><div id="bar"></div></div>
        <div id="stage"></div>
        <div id="notes"></div>
      </div>
    </div>
    <div id="navbtns">
      <button id="prev">←</button><button id="next">→</button>
    </div>

    <script>
      /* ================= SLIDES ================= */
      const CH = {
        F: "Foundations",
        L: "The loop up close",
        T: "See it live",
        A: "APIs & beyond",
        Y: "Your assignment",
      };
      const esc = (s) => s.replace(/&/g, "&amp;").replace(/</g, "&lt;");
      const slides = [];
      const S = (chapter, nav, kick, title, body, notes) =>
        slides.push({ chapter, nav, kick, title, body, notes });

      /* 1 · Title */
      (S(
        CH.F,
        "Welcome",
        "Backend Development Track · Week 2",
        "Backend 101 — How the Web Works",
        `
  <p class="sub">Lecture + demos · 60 min · All levels welcome — no experience needed</p>
  <div class="strip"><b>Today:</b> what really happens when you open a website — clients, servers, URLs, HTTP, requests and responses — ending inside your first assignment: <b>build your own CRUD API</b>.</div>
  <p class="bl">Use <b>← →</b> or a presenter clicker to move · <b>N</b> for speaker notes · <b>F</b> for fullscreen.</p>`,
        "Welcome, chat check-in. Frame: the most important lecture of the track, ends inside the assignment. We skip cables-and-packets theory on purpose — resource list §1 has under-the-hood reads.",
      ),
        /* 2 · Clients & servers */
        S(
          CH.F,
          "Clients & servers",
          "The two roles",
          "Clients ask. Servers answer.",
          `
  <p class="sub">The whole web is a restaurant — and this picture is the entire lecture in one slide.</p>
  <div class="arrowflow">
    <div class="card" style="text-align:center; min-width:200px;"><div class="ico">🧑</div><h3 class="g">YOU — the client</h3><p class="cap">You pick from the menu and place an order</p></div>
    <div class="ar">→</div>
    <div class="card" style="text-align:center; min-width:200px;"><div class="ico">📋</div><h3 class="g">THE ORDER — a request</h3><p class="cap">Carried to the kitchen, written in a fixed format</p></div>
    <div class="ar">→</div>
    <div class="card" style="text-align:center; min-width:200px;"><div class="ico">👨‍🍳</div><h3 class="g">THE KITCHEN — the server</h3><p class="cap">Always open, prepares the answer to every order</p></div>
  </div>
  <p style="text-align:center; color:var(--mut); font-size:13px;">←  the meal comes back — that's the <b style="color:var(--txt)">response</b></p>
  <div class="strip"><b>A client is anything that asks:</b> your browser · a phone app · curl · Swagger UI · even another server.</div>`,
          "The most important slide of the day — say so. Client is a ROLE, not a device. Chat prompt: when your phone shows the weather, who is the client?",
        ),
        /* 3 · FE/BE */
        S(
          CH.F,
          "Frontend vs backend",
          "Where the code lives",
          "Frontend and backend — two halves, one loop",
          `
  <div class="cards c2">
    <div class="card"><div class="ico">📱</div><h3>Frontend — on your device</h3><p>Buttons, colors, text — everything you can see and touch. Runs in the browser or the app.</p></div>
    <div class="card hl"><div class="ico">🗄️</div><h3 class="g">Backend — on a server</h3><p>Data, rules, passwords — everything you have to trust. Runs on a machine you never see. Decides what's allowed.</p></div>
  </div>
  <div class="strip"><b>One tap, one loop — Instagram:</b> you tap the ♥ (frontend) → it sends <span class="mono">POST /likes</span> → the backend checks you're allowed, saves it → responds <span class="ok mono">201</span> → the heart turns red (frontend again).</div>
  <p class="bl"><b>They only ever talk through requests and responses.</b> <span class="g">This track builds the answering half.</span></p>`,
          "Show them CONNECTED, not just split. Walk the like-button loop slowly. Chat: what else must the backend check before saving a like? (logged in? already liked? blocked?)",
        ),
        /* 4 · URL anatomy (interactive) */
        S(
          CH.F,
          "Anatomy of a URL",
          "The address",
          "Anatomy of a URL — read any address",
          `
  <p class="sub">Click any part — every one has a small job. First your assignment's address, then the same address out in the real world.</p>
  <p class="bl" style="margin:0 0 6px;"><b>While you build:</b></p>
  <div class="urlbox" id="urlbox">
    <span class="seg mono" data-k="protocol">http://</span><span class="seg mono" data-k="domain">localhost</span><span class="seg mono" data-k="port">:3000</span><span class="seg mono" data-k="path">/tasks/3</span><span class="seg mono" data-k="query">?done=true</span>
  </div>
  <p class="bl" style="margin:10px 0 6px;"><b>Out in the world:</b></p>
  <div class="urlbox">
    <span class="seg mono" data-k="rprotocol">https://</span><span class="seg mono" data-k="rdomain">flyrank.ai</span><span class="seg mono" data-k="rport">:443</span><span class="seg mono" data-k="rpath">/tasks/3</span><span class="seg mono" data-k="rquery">?done=true</span>
  </div>
  <div class="infobox" id="urlinfo"><b>Click a part above.</b> Hold the thought on <span class="mono">http://</span> — protocols get their own slide in a few minutes.</div>
  <div class="strip"><b>Same shape, different home.</b> Deploying changes the lock (https), the name, and the hidden door — your paths and queries travel unchanged.</div>`,
          "Read left to right like a postal address. Port: Express picks 3000, FastAPI 8000. Query params return in the assignment extras (?done=true is the filtering stretch goal). Protocol slide comes soon — promise it now.",
        ),
        /* 5 · Journey (interactive) */
        S(
          CH.F,
          "Journey of a request",
          "One second, step by step",
          "You type flyrank.ai and press Enter — what happens?",
          `
  <div class="jstage" id="jstage">
    <div class="jnode"><div class="em">🧑‍💻</div><div class="nm">You — the client</div></div>
    <div class="jnode"><div class="em">📖</div><div class="nm">DNS phonebook</div></div>
    <div class="jnode"><div class="em">✉️</div><div class="nm">Request travels</div></div>
    <div class="jnode"><div class="em">⚙️</div><div class="nm">Server works</div></div>
    <div class="jnode"><div class="em">🧑‍💻</div><div class="nm">Back to the client</div></div>
  </div>
  <div class="infobox" id="jmsg"><b>Press "Next step"</b> to run the journey.</div>
  <div class="row"><button class="btn" id="jnext">Next step →</button><button class="btn ghost" id="jreset">Restart</button></div>
  <p class="bl"><b>The client starts the loop and the client ends it</b> — all of it usually in under one second.</p>`,
          "Walk it slowly — the slow-motion replay of one second. DNS = phonebook, one sentence only. Step 4 gets its own slide soon — promise that now.",
        ),
        /* 6 · Where servers live */
        S(
          CH.F,
          "Where servers live",
          "Geography",
          "Where does a server actually live?",
          `
  <div class="cards c3">
    <div class="card hl"><div class="ico">💻</div><h3 class="g">Your laptop — localhost</h3><p>While you build: the server runs on YOUR machine, door 3000. Only you can reach it. This is your assignment's home.</p></div>
    <div class="card"><div class="ico">🏢</div><h3>A data center</h3><p>Real servers: buildings full of computers that never sleep, with fast internet and backup power.</p></div>
    <div class="card"><div class="ico">☁️</div><h3>The cloud</h3><p>Renting machines in someone else's data center — AWS, Google Cloud, Azure, Netlify, Vercel, etc. Same computers, no building to own.</p></div>
  </div>
  <p class="bl"><b>"Deploying" = moving your program from the first card to the others.</b> Your assignment stays on localhost — that's normal; it's how every backend developer works all day.</p>`,
          "Kills the 'is localhost real programming?' doubt early. Deployment comes later in the track.",
        ),
        /* 7 · Cloud */
        S(
          CH.F,
          "The cloud",
          "Renting computers",
          "The cloud — computers you rent, not own",
          `
  <div class="cards c2">
    <div class="card hl"><div class="ico">⚡</div><h3 class="g">The electricity model</h3><p>You don't build a power plant to turn on a lamp — you plug into the grid and pay for what you use.<br><br>The cloud is the same idea for computers: plug into a data center over the internet, pay by the minute.</p></div>
    <div>
      <div class="card" style="margin-bottom:10px;"><h3 class="g" style="font-size:12px;">HOW IT WORKS</h3><p>One huge physical machine is split into many <i>virtual</i> servers. Click a button — yours is ready in seconds, anywhere on Earth.</p></div>
      <div class="card" style="margin-bottom:10px;"><h3 class="g" style="font-size:12px;">WHY IT MATTERS</h3><p>Start with one tiny server, grow to millions of users — without ever buying hardware. Most of the internet runs this way.</p></div>
      <div class="card"><h3 class="g" style="font-size:12px;">WHO RUNS IT</h3><p>AWS, Google Cloud, Microsoft Azure. They handle buildings, power, cooling, security. You bring the code.</p></div>
    </div>
  </div>
  <div class="strip">💼 <b>Whole careers live here:</b> Cloud Engineer · DevOps Engineer · SRE · Cloud Architect. Map + starting points: <b>Cloud 101</b> in the portal.</div>
  <p class="bl"><b>For now, just know it exists.</b> Your assignment stays on localhost — and cloud free tiers ask for credit cards, so this week: read, watch, don't sign up. This program stays $0.</p>`,
          "Utility analogy is the whole slide. Roles: Cloud Engineer builds there, DevOps automates the path, SRE keeps it alive at 3am. Say the credit-card caveat OUT LOUD.",
        ),
        /* 8 · HTTP protocol */
        S(
          CH.L,
